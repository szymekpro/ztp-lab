services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: postgres_ztp_project2
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: adminer_ztp
    restart: always
    ports:
      - "8080:8080"

volumes:
  pgdata:
