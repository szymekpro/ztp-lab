services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: postgres_ztp_project2
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: adminer_ztp
    restart: always
    ports:
      - "8080:8080"

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog_ztp
    ports:
      - "8025:8025"
      - "1025:1025"

  ntfy:
    image: binwiederhier/ntfy
    container_name: ntfy_ztp
    command: serve
    ports:
      - "8088:80"

volumes:
  pgdata:
